apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: boutique
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

  selector:
    matchLabels:
      app: user-service

  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: 632421563950.dkr.ecr.us-east-1.amazonaws.com/user-service:2664b7e761df7d574c860ad322a8adc1d68de7f2
          ports:
            - containerPort: 3006
          env:
            - name: NODE_ENV
              value: development
            - name: PORT
              value: "3006"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: USERS_DB_URL

---

apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: boutique
spec:
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 3006
      targetPort: 3006
  type: ClusterIP